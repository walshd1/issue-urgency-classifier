name: 'Issue Urgency Classifier'
description: 'Classifies new issues based on their description and labels, predicting their urgency level (e.g., critical, high, medium, low).'
author: 'walshd1'
branding:
  icon: 'zap'
  color: 'blue'
inputs:
  gemini_api_key:
    description: 'Gemini API key (free)'
    required: false
  service_token:
    description: 'Service token (paid)'
    required: false
outputs:
  result:
    description: 'Result'
runs:
  using: 'node20'
  main: 'dist/index.js'
